<div id="wrapper">
    <nav id="sidebar" [class.active]="isSidebarCollapsed">
        <div class="sidebar-header" style="text-align: -webkit-center;">
            <h3>ZRB ERP</h3>
            <small>User: <strong>{{ usernameLogged }}</strong></small>
        </div>

        <ul class="list-unstyled components">
            <li routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                <a routerLink="/layout/dashboard">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>
            <li routerLinkActive="active">
                <a routerLink="/layout/orders">
                    <i class="bi bi-list-ul me-2"></i> Orders
                </a>
            </li>
            <li routerLinkActive="active">
                <a routerLink="/layout/products">
                    <i class="bi bi-boxes me-2"></i> Products and categories
                </a>
            </li>
            <li routerLinkActive="active">
                <a routerLink="/layout/customers">
                    <i class="bi bi-person-badge me-2"></i> Customers
                </a>
            </li>
            <li routerLinkActive="active">
                <a routerLink="/layout/suppliers">
                    <i class="bi bi-truck me-2"></i> Shippers and suppliers
                </a>
            </li>
            
            @if (isManager) {
                <li routerLinkActive="active">
                    <a routerLink="/layout/employees">
                        <i class="bi bi-person-vcard me-2"></i> Employees
                    </a>
                </li>
            }

            <li>
                <button (click)="onLogout()" class="btn btn-link text-danger p-0 ms-3 mt-3" style="text-decoration:none;">
                    <i class="bi bi-box-arrow-right me-2"></i> Logout
                </button>
            </li>
        </ul>

        <button type="button" id="sidebarCollapse" class="btn btn-primary" (click)="toggleSidebar()">
            <i class="bi" [ngClass]="isSidebarCollapsed ? 'bi-caret-right-square-fill' : 'bi-caret-left-square-fill'"></i>
        </button>
    </nav>

    <div id="content">
        <nav class="navbar navbar-light bg-white p-0 border-bottom shadow-sm">
            <div class="container-fluid d-flex align-items-center" style="height: 70px; padding-left: 55px;">
                <span class="navbar-brand mb-0 h1 fs-5 text-dark fw-semibold">
                    Northwind Management Studio
                </span>
            </div>
        </nav>

        <div class="content-scrollable-zone">
            <div class="container-fluid">
                <router-outlet></router-outlet>
            </div>
        </div>
        
    </div>
</div>
