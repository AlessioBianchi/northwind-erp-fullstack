services:
  postgres:
    image: postgres:16
    container_name: erp-postgres
    environment:
      POSTGRES_DB: northwind
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - erp-postgres-data:/var/lib/postgresql/data

volumes:
  erp-postgres-data: